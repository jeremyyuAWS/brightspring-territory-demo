# Netlify build configuration for the BrightSpring Territory Command Center demo.
#
# The live Mapbox map needs VITE_MAPBOX_ACCESS_TOKEN set as a Netlify environment
# variable (Site settings → Environment variables). Without it, the site builds and
# runs fine using the built-in inline-SVG map fallback.
#
# Note: this is a PUBLIC Mapbox token (pk.*) and is inlined into the client bundle at
# build time — restrict it to your deploy domain(s) in the Mapbox account.

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Single-page app: serve index.html for any path (harmless even without client routing).
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
